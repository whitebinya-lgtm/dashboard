<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #f0f6fc;
            letter-spacing: -0.5px;
        }

        .button-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
            padding: 0 20px;
        }

        .btn {
            text-decoration: none;
            color: #ffffff;
            background-color: #21262d;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid #30363d;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
            transform: translateY(-2px);
        }

        /* Specific accents for popular platforms */
        .btn-yt:hover { border-color: #ff0000; color: #ff0000; }
        .btn-roblox:hover { border-color: #f68802; color: #f68802; }
        .btn-gemini:hover { border-color: #4285f4; color: #4285f4; }
        .btn-gpt:hover { border-color: #10a37f; color: #10a37f; }
    </style>
</head>
<body>

    <h1>Good to see you, my owner.</h1>

    <div class="button-container">
        <a href="about:blank" target="_blank" class="btn">New Tab</a>
        <a href="https://www.youtube.com" target="_blank" class="btn btn-yt">YouTube</a>
        <a href="https://www.roblox.com" target="_blank" class="btn btn-roblox">Roblox</a>
        <a href="https://gemini.google.com" target="_blank" class="btn btn-gemini">Gemini</a>
        <a href="https://chatgpt.com" target="_blank" class="btn btn-gpt">ChatGPT</a>
    </div>

</body>
</html>
